<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Velaine — Curated Luxury Beauty</title>
<meta name="description" content="Maison Velaine curates the finest in luxury skincare, makeup, fragrance and haircare. Discover our edit.">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2246%22%20fill%3D%22%23231327%22/%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2244%22%20fill%3D%22none%22%20stroke%3D%22%23b08d57%22%20stroke-width%3D%221.6%22/%3E%3Ctext%20x%3D%2250%22%20y%3D%2268%22%20text-anchor%3D%22middle%22%20font-family%3D%22Cormorant%20Garamond%2C%20Georgia%2C%20serif%22%20font-size%3D%2256%22%20fill%3D%22%23b08d57%22%3EV%3C/text%3E%3C/svg%3E">
  <meta name="p:domain_verify" content="e7a94260950487c2d9e90f5669fcd9ec"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&amp;family=Jost:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --velvet:#231327;
    --velvet-deep:#180d1b;
    --champagne:#efe3d0;
    --champagne-dim:#c9b99f;
    --rose:#d9a5a5;
    --gold:#b08d57;
    --card:#2d1a32;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
  body{
    background:radial-gradient(ellipse at 50% -10%, #33203a 0%, var(--velvet) 45%, var(--velvet-deep) 100%);
    color:var(--champagne);
    font-family:'Jost',sans-serif;
    font-weight:300;
    line-height:1.6;
    min-height:100vh;
  }
  a{color:inherit}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  header{padding:26px 0 0;text-align:center}
  .sceau{display:block;margin:0 auto 14px}
  .marque{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2.4rem,7vw,4.2rem);
    font-weight:500;
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  .marque .ligne{display:block;font-size:.32em;letter-spacing:.62em;color:var(--gold);margin-top:.4em;font-family:'Jost',sans-serif;font-weight:400;text-transform:uppercase}
  .filet{width:64px;height:1px;background:var(--gold);margin:26px auto}

  .hero{text-align:center;padding:8px 0 44px}
  .hero p{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(1.15rem,3vw,1.5rem);
    color:var(--champagne-dim);
    max-width:34ch;margin:0 auto;
  }

  nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding-bottom:40px}
  nav button{
    background:none;border:1px solid rgba(176,141,87,.45);
    color:var(--champagne-dim);
    font-family:'Jost',sans-serif;font-weight:400;font-size:.8rem;
    letter-spacing:.18em;text-transform:uppercase;
    padding:9px 18px;border-radius:999px;cursor:pointer;
    transition:color .2s,border-color .2s;
  }
  nav button:hover,nav button:focus-visible{color:var(--champagne);border-color:var(--gold)}
  nav button[aria-pressed="true"]{color:var(--velvet-deep);background:var(--gold);border-color:var(--gold)}
  nav button:focus-visible{outline:2px solid var(--rose);outline-offset:2px}

  .grid{
    display:grid;gap:22px;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    padding-bottom:70px;
  }
  .fiche{
    background:linear-gradient(160deg,#33203a 0%,var(--card) 60%);
    border:1px solid rgba(176,141,87,.28);
    padding:14px 14px 20px;
    display:flex;flex-direction:column;
    transition:transform .25s,border-color .25s;
  }
  .fiche:hover{transform:translateY(-4px);border-color:var(--gold)}
  .fiche .visuel{
    aspect-ratio:1/1;background:var(--velvet-deep);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;margin-bottom:16px;
  }
  .fiche .visuel img{width:100%;height:100%;object-fit:contain;background:#fff}
  .fiche .visuel .initiale{
    font-family:'Cormorant Garamond',serif;font-size:3rem;color:rgba(217,165,165,.35);font-style:italic;
  }
  .fiche .cat{font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  .fiche h3{
    font-family:'Cormorant Garamond',serif;font-weight:500;
    font-size:1.28rem;line-height:1.25;margin-bottom:4px;
  }
  .fiche .marque-p{font-size:.82rem;color:var(--champagne-dim);margin-bottom:16px}
  .fiche a.lien{
    margin-top:auto;text-align:center;text-decoration:none;
    border:1px solid var(--gold);color:var(--champagne);
    font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;font-weight:400;
    padding:11px 0;transition:background .2s,color .2s;
  }
  .fiche a.lien:hover,.fiche a.lien:focus-visible{background:var(--gold);color:var(--velvet-deep)}
  .fiche a.lien:focus-visible{outline:2px solid var(--rose);outline-offset:2px}

  .disclosure{
    border-top:1px solid rgba(176,141,87,.3);
    padding:34px 0 10px;text-align:center;
    font-size:.85rem;color:var(--champagne-dim);max-width:62ch;margin:0 auto;
  }
  footer{text-align:center;padding:28px 0 44px;font-size:.75rem;letter-spacing:.14em;color:rgba(201,185,159,.55);text-transform:uppercase}
  footer .filet{margin:0 auto 20px}
</style>
</head>
<body>

<header class="wrap">
  <svg class="sceau" width="74" height="74" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#231327"/><circle cx="50" cy="50" r="44" fill="none" stroke="#b08d57" stroke-width="1.6"/><text x="50" y="68" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="56" fill="#b08d57">V</text></svg>
  <h1 class="marque">Maison Velaine<span class="ligne">Curated Luxury Beauty</span></h1>
  <div class="filet" aria-hidden="true"></div>
</header>

<section class="hero wrap">
  <p>The velvet edit — skincare, scent &amp; beauty pieces worth keeping.</p>
</section>

<nav class="wrap" aria-label="Product categories"></nav>

<main class="wrap">
  <div class="grid" id="grid"></div>
</main>

<div class="wrap">
  <p class="disclosure">
    As an Amazon Associate, Maison Velaine earns from qualifying purchases.
    Prices and availability are shown on Amazon and may change at any time.
  </p>
</div>

<footer>
  <div class="filet" aria-hidden="true"></div>
  &copy; 2026 Maison Velaine
</footer>

<script>
/* ═══════════════════════════════════════════════════════
   All 15 verified Premium Beauty products (10% tier).
   To add a product later: copy a line, swap in the new
   name/brand/cat/link/img. Categories must match CATEGORIES.
   ═══════════════════════════════════════════════════════ */
const PRODUCTS = [
  {name:"Magic Cream Moisturizer", brand:"Charlotte Tilbury", cat:"Skincare", link:"https://amzn.to/4vySXA0", img:"https://m.media-amazon.com/images/I/51Iq0FVu8gL._SL1500_.jpg"},
  {name:"Matte Revolution Lipstick — Pillow Talk", brand:"Charlotte Tilbury", cat:"Makeup", link:"https://amzn.to/4fc3ueg", img:"https://m.media-amazon.com/images/I/71qCseJI6TL._SL1500_.jpg"},
  {name:"Pro-Collagen Cleansing Balm", brand:"Elemis", cat:"Skincare", link:"https://amzn.to/4yrJdu4", img:"https://m.media-amazon.com/images/I/61Tja-KY1HL._SL1500_.jpg"},
  {name:"Pro-Collagen Marine Cream", brand:"Elemis", cat:"Skincare", link:"https://amzn.to/4584RWR", img:"https://m.media-amazon.com/images/I/61iCE9JjP6L._SL1500_.jpg"},
  {name:"Facial Treatment Essence", brand:"SK-II", cat:"Skincare", link:"https://amzn.to/4wkqpve", img:"https://m.media-amazon.com/images/I/61OAb4SW6AL._SL1500_.jpg"},
  {name:"The Rich Cream", brand:"Augustinus Bader", cat:"Skincare", link:"https://amzn.to/4vyHz7q", img:"https://m.media-amazon.com/images/I/71A11h4aRZL._SL1500_.jpg"},
  {name:"Platinum+ Styler", brand:"ghd", cat:"Hair", link:"https://amzn.to/4vynjmg", img:"https://m.media-amazon.com/images/I/61W6ELJKwlL._SL1500_.jpg"},
  {name:"AireBrush Duo", brand:"T3", cat:"Hair", link:"https://amzn.to/44vTYhp", img:"https://m.media-amazon.com/images/I/61vA4ACkvKL._SL1500_.jpg"},
  {name:"Gold Lust Repair Shampoo", brand:"Oribe", cat:"Hair", link:"https://amzn.to/4b3hMNk", img:"https://m.media-amazon.com/images/I/614TiuhTMjL._SL1500_.jpg"},
  {name:"Dry Texturizing Spray", brand:"Oribe", cat:"Hair", link:"https://amzn.to/44AJaPa", img:"https://m.media-amazon.com/images/I/71enRpyGa+L._SL1500_.jpg"},
  {name:"No.3 Hair Perfector", brand:"Olaplex", cat:"Hair", link:"https://amzn.to/4ypBXPz", img:"https://m.media-amazon.com/images/I/610sljWCCzL._SL1500_.jpg"},
  {name:"Elixir Ultime Hair Oil", brand:"Kérastase", cat:"Hair", link:"https://amzn.to/4prMGot", img:"https://m.media-amazon.com/images/I/516bW668JrL._SL1500_.jpg"},
  {name:"Replica By the Fireplace", brand:"Maison Margiela", cat:"Fragrance", link:"https://amzn.to/4yIyZ90", img:"https://m.media-amazon.com/images/I/714Brry1CSL._SL1500_.jpg"},
  {name:"Concealer", brand:"Clé de Peau Beauté", cat:"Makeup", link:"https://amzn.to/4purxdd", img:"https://m.media-amazon.com/images/I/61evjdQLbnL._AC_SL1500_.jpg"},
  {name:"Ambient Lighting Palette", brand:"Hourglass", cat:"Makeup", link:"https://amzn.to/4wHs26e", img:"https://m.media-amazon.com/images/I/61K-+QmYqyS._SL1500_.jpg"},
];

const CATEGORIES = ["All","Skincare","Makeup","Fragrance","Hair"];
let active = "All";

const nav = document.querySelector("nav");
const grid = document.getElementById("grid");

function renderNav(){
  nav.innerHTML = "";
  CATEGORIES.forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    b.setAttribute("aria-pressed", String(c===active));
    b.addEventListener("click",()=>{active=c;renderNav();renderGrid();});
    nav.appendChild(b);
  });
}

function renderGrid(){
  grid.innerHTML="";
  PRODUCTS
    .filter(p=>active==="All"||p.cat===active)
    .forEach(p=>{
      const card=document.createElement("article");
      card.className="fiche";
      const visual = p.img
        ? `<img src="${p.img}" alt="${p.brand} ${p.name}" loading="lazy">`
        : `<span class="initiale" aria-hidden="true">${p.brand.charAt(0)}</span>`;
      card.innerHTML=`
        <div class="visuel">${visual}</div>
        <div class="cat">${p.cat}</div>
        <h3>${p.name}</h3>
        <div class="marque-p">${p.brand}</div>
        <a class="lien" href="${p.link}" target="_blank" rel="noopener sponsored">View on Amazon</a>`;
      grid.appendChild(card);
    });
}

renderNav();
renderGrid();
</script>
</body>
</html>
